server {
    listen 80;
    server_name localhost;

    # Root directory for your website files (must match the path in the PHP container)
    root /usr/share/nginx/html/public;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Pass PHP scripts to PHP-FPM
    location ~ ^/index\.php(/|$) {
        # 'app' matches the service name in your docker-compose.yml
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        # Crucial: Maps the script file for PHP-FPM to find
        fastcgi_param SCRIPT_FILENAME /app/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /app/public;

        # Prevents direct access to index.php by clients
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/hookyard_error.log;
    access_log /var/log/nginx/hookyard_access.log;
}
