security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            provider: app_user_provider
            stateless: false
            entry_point: App\Security\JsonAuthenticationEntryPoint
            json_login:
                check_path: /login
                username_path: email
                password_path: password
                success_handler: App\Security\AuthenticationSuccessHandler
                failure_handler: App\Security\AuthenticationFailureHandler
            logout:
                path: /logout
                invalidate_session: true

    access_control:
        - { path: ^/api/v1/register$, roles: PUBLIC_ACCESS }
        - { path: ^/login$,    roles: PUBLIC_ACCESS }
        - { path: ^/in/,       roles: PUBLIC_ACCESS }
        - { path: ^/api/,      roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Entity\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
